<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 互联网的边界</title>
    <base target="_top">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&display=swap');

        :root {
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #3d4a5d;
            --text-muted: #718096;
            --primary-accent: #8fb1cb;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'system-ui', '-apple-system', sans-serif;
            overflow: hidden;
            background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 50%, #dff6fe 100%);
            background-size: 300% 300%;
            animation: breatheBackground 18s ease infinite;
            cursor: crosshair;
        }

        @keyframes breatheBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 漫游发光粒子 */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            pointer-events: none;
            filter: blur(8px);
            z-index: 1;
        }

        /* 玻璃态卡片容器 */
        .card-container {
            perspective: 1000px;
            z-index: 10;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 4rem;
            box-shadow: 0 10px 40px rgba(100, 110, 140, 0.1), 
                        inset 0 2px 2px rgba(255,255,255,0.8);
            text-align: center;
            max-width: 500px;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            position: relative;
        }

        /* 会盯人的 404 */
        .title-404 {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 2px 8px 15px rgba(100, 110, 140, 0.2);
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
            transform: translateZ(50px);
        }

        .eye-container {
            width: 90px;
            height: 120px;
            background: #fff;
            border-radius: 50%;
            margin: 0 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 8px 10px rgba(0,0,0,0.1),
                        0 5px 15px rgba(0,0,0,0.05);
            position: relative;
        }

        .pupil {
            width: 35px;
            height: 35px;
            background: #2a3441;
            border-radius: 50%;
            position: absolute;
            transition: transform 0.05s linear;
        }

        .pupil::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            top: 5px;
            right: 8px;
        }

        h2 {
            font-family: 'Noto Serif SC', serif;
            color: var(--text-main);
            font-size: 1.8rem;
            margin-top: 2rem;
            transform: translateZ(30px);
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
            transform: translateZ(20px);
            font-weight: 300;
        }

        /* 治愈系按钮 */
        .back-btn {
            display: inline-block;
            padding: 14px 32px;
            background: #ffffff;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 8px 15px rgba(100, 110, 140, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateZ(40px);
            border: 2px solid transparent;
        }

        .back-btn:hover {
            box-shadow: 0 15px 20px rgba(143, 177, 203, 0.3);
            border-color: var(--primary-accent);
            transform: translateZ(40px) translateY(-5px) scale(1.05);
        }

        /* 鼠标点击产生的掉落文本（核心心意交互） */
        .pop-text {
            position: absolute;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(5px);
            padding: 10px 18px;
            border-radius: 20px;
            color: #556070;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95rem;
            pointer-events: none;
            animation: floatUpFade 4s ease forwards;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            z-index: 100;
        }

        @keyframes floatUpFade {
            0% { opacity: 0; transform: translate(-50%, 20px) scale(0.8); }
            10% { opacity: 1; transform: translate(-50%, 0px) scale(1.05); }
            100% { opacity: 0; transform: translate(-50%, -100px) scale(1); filter: blur(2px); }
        }

        .hint {
            position: absolute;
            bottom: 30px;
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 2px;
            opacity: 0.6;
            animation: pulseHint 3s infinite;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

    </style>
</head>
<body>

    <!-- 动态微粒生成层 -->
    <div id="particles"></div>

    <div class="card-container" id="cardContainer">
        <div class="glass-card" id="card">
            <h1 class="title-404">
                4
                <div class="eye-container" id="eyeArea">
                    <div class="pupil" id="pupil"></div>
                </div>
                4
            </h1>
            <h2>薛定谔的页面</h2>
            <p>观测导致了坍缩，你要找的页面已被时空涡流带走。<br>别急着走，既然落在这片赛博留白中，<br>试着随便点点屏幕，这里散落着互联网的只言片语。</p>
            <a href="/" class="back-btn">假装一切正常地离开</a>
        </div>
    </div>

    <div class="hint">✦ 试着在这片空间随便点点，或者移动你的鼠标 ✦</div>

    <script>
        // 1. 生成极具优雅感和层次的漫游背景粒子（性能向优化）
        const particleContainer = document.getElementById('particles');
        const particleCount = 20;
        
        for (let i = 0; i < particleCount; i++) {
            let p = document.createElement('div');
            p.classList.add('particle');
            
            // 随机大小，大中小产生纵深感
            let size = Math.random() * 100 + 50; 
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            
            // 初始随机位置
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            
            // 每个粒子的随机慢动作飘浮
            p.style.transition = `all ${Math.random() * 5 + 8}s linear`;
            particleContainer.appendChild(p);

            // 让粒子持续缓慢无规则漫游
            setInterval(() => {
                p.style.transform = `translate(${Math.random() * 150 - 75}px, ${Math.random() * 150 - 75}px) scale(${Math.random() * 0.4 + 0.8})`;
            }, 3000);
        }

        // 2. 眼球注视跟踪 & 玻璃卡片优雅视差
        const pupil = document.getElementById('pupil');
        const eyeArea = document.getElementById('eyeArea');
        const cardContainer = document.getElementById('cardContainer');
        const card = document.getElementById('card');

        document.addEventListener('mousemove', (e) => {
            const { clientX: x, clientY: y } = e;
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;

            // ---- 计算眼球转动 ----
            const eyeRect = eyeArea.getBoundingClientRect();
            const eyeCx = eyeRect.left + eyeRect.width / 2;
            const eyeCy = eyeRect.top + eyeRect.height / 2;
            
            const angle = Math.atan2(y - eyeCy, x - eyeCx);
            // 限制眼球活动半径 (例如 25px内)
            const distance = Math.min(eyeRect.width/4, Math.hypot(x - eyeCx, y - eyeCy) / 10);
            
            const pupilX = Math.cos(angle) * distance;
            const pupilY = Math.sin(angle) * distance;
            
            pupil.style.transform = `translate(${pupilX}px, ${pupilY}px)`;

            // ---- 卡片整体极其克制的3D倾斜，提供透气的立体感 ----
            const tiltX = (y - cy) / cy * -8;  // max tilt angle
            const tiltY = (x - cx) / cx * 8;
            card.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
        });

        // 取消鼠标离开时的视差倾斜
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateX(0deg) rotateY(0deg)`;
            pupil.style.transform = `translate(0px, 0px)`;
        });

        // 3. 核心创新交互：高级冷幽默文字掉落系统
        // 精心撰写的“网络遗留物”库，符合既有心意又治愈的特质
        const randomQuotes = [
            "嘘，这里刚走过一只比特级的赛博小猫🐾",
            "该页面可能去隔壁服客串了",
            "别催，数据包还在用小推车运...",
            "这是互联网地图之外的一片小森林 🌳",
            "人生总有意外，比如现在 🤷‍♂️",
            "恭喜触发了毫无用处的隐藏成就！🎉",
            "喝杯温水，去拉开窗帘看看天空吧 ☁️",
            "前端工程师已被献祭给代码之神",
            "它只是累了，找了个云层休息一下",
            "【量子力学提醒您：继续观察】👁",
            "其实404并不是错误，只是一场短暂的走失",
            "不如就坐下，欣赏一会儿网页的心跳声？"
        ];

        document.addEventListener('click', (e) => {
            // 点击如果是卡片内部的按钮，阻止触发特效
            if(e.target.tagName.toLowerCase() === 'a') return;

            // 播放一滴微小的“清脆感”（这里用动画表现视觉的灵动，而不是强加真实音频打扰用户）
            createTextPop(e.clientX, e.clientY);
        });

        function createTextPop(x, y) {
            const textElement = document.createElement('div');
            textElement.classList.add('pop-text');
            
            // 随机获取治愈金句
            textElement.innerText = randomQuotes[Math.floor(Math.random() * randomQuotes.length)];
            
            // 设置初始点击位置
            textElement.style.left = `${x}px`;
            textElement.style.top = `${y}px`;
            
            // 每次弹出的些许随机偏移角度
            const rotate = Math.random() * 10 - 5;
            textElement.style.transform = `translate(-50%, 0) rotate(${rotate}deg)`;
            
            document.body.appendChild(textElement);

            // 动画执行完毕后移除DOM，维持“多而不乱”
            setTimeout(() => {
                textElement.remove();
            }, 4000);
        }

    </script>
</body>
</html>
